<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cloud Simulation</title>
  <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>



</head>

<body>
  <h2>Cloud Simulation</h2>
  <form id="simulation_form">
    Steps: <input type="number" name="steps" value="50"><br>
    Height: <input type="number" name="height" value="10"><br>
    Wind Speed: <input type="number" name="wind_speed" value="5"><br>
    Wind Direction: <input type="text" name="wind_dir" value="north"><br>
    Minimum Neighbour (To Survive): <input type="number" name="min_neighbour" value="3"><br>
    Maximum Neighbour (To Survive): <input type="number" name="max_neighbour" value="8"><br>
    Initial State (Binary Only): <table id="table"></table>
    <button type="button" onClick="add_row()">Add Row</button>
    <button type="button" onClick="add_col()">Add Column</button>
    <button type="submit">Run Simulation</button>
  </form>
  <button type="button" id="register" onclick="go_home()">Home Page</button>

  <div id="falling_snow_simulation" style="width: 100%; height: 600px;"></div>

  <script>
    const form = document.getElementById('simulation_form');
    const table = document.getElementById('table');
    const plot = document.getElementById('falling_snow_simulation');

    function go_home() {
      setTimeout(() => {
        window.location.href = `/`;
      }, 200);
    }

    function add_row(cols = table.rows[0]?.cells.length || 3) {

      const row = table.insertRow();
      for (let i = 0; i < cols; i++) {
        const new_cell = row.insertCell();
        const input = document.createElement('input');
        input.type = 'number';
        input.value = 0;
        new_cell.appendChild(input);
      }
    }

    function add_col() {
      for (let i = 0; i < table.rows.length; i++) {
        const new_cell = table.rows[i].insertCell();
        const input = document.createElement('input');
        input.type = 'number';
        input.value = 0;
        new_cell.appendChild(input);
      }
    }

    function initialise_table(row, col) {
      for (let i = 0; i < row; i++) add_row(col);
    }

    initialise_table(4, 4);



    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      // turn KVP into objects
      const formData = Object.fromEntries(new FormData(form));

      // retreive inital state from table
      const initial_state = [];
      for (let i = 0; i < table.rows.length; i++) {
        const row = [];
        for (let j = 0; j < table.rows[i].cells.length; j++) {
          const input_state = table.rows[i].cells[j].querySelector('input').value;
          row.push(parseInt(input_state))
        }
        initial_state.push(row)
      }
      //  initial_state, steps, height, wind_speed, wind_dir, min_neighbour, max_neighbour 
      // create fetch response based on user input
      formData.initial_state = initial_state;
      formData.steps = Number(formData.steps);
      formData.height = Number(formData.height);
      formData.wind_speed = Number(formData.wind_speed);
      formData.wind_dir = formData.wind_dir;
      formData.min_neighbour = Number(formData.min_neighbour);
      formData.max_neighbour = Number(formData.max_neighbour);


      const res = await fetch('/simulation/falling_snow', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });

      const data = await res.json();
      if (res.ok) {
        const x = data.system_coordinate_history_x;
        const y = data.system_coordinate_history_y;
        const z = data.system_coordinate_history_z;

        animateCloud(x, y, z);
      }
      else {
        console.error('Error JSON:', data);
      }
    });

    function animateCloud(system_coord_x, system_coord_y, system_coord_z) {
      // initial frame (timestep 0)
      const trace = {
        x: system_coord_x[0],
        y: system_coord_y[0],
        z: system_coord_z[0],
        mode: 'markers',
        type: 'scatter3d',
        marker: { size: 3, color: 'blue', opacity: 0.6 }
      };

      // remove empty array
      system_coord_x = system_coord_x.filter(item => !Array.isArray(item) || item.length > 0);
      system_coord_y = system_coord_y.filter(item => !Array.isArray(item) || item.length > 0);
      system_coord_z = system_coord_z.filter(item => !Array.isArray(item) || item.length > 0);

      const frames = system_coord_x.map((_, t) => ({
        name: `frame${t}`,
        data: [{
          x: system_coord_x[t],
          y: system_coord_y[t],
          z: system_coord_z[t],
          mode: 'markers',
          type: 'scatter3d',
          marker: { size: 3, color: 'blue', opacity: 0.6 }
        }]
      }));
      // const step_x = system_coord_x.length;
      const max_x = system_coord_x.reduce((max, step) => Math.max(max, ...step), -Infinity);
      const min_x = system_coord_x.reduce((min, step) => Math.min(min, ...step), Infinity);

      const step_y = system_coord_y.length;
      const max_y = system_coord_y.reduce((max, step) => Math.max(max, ...step), -Infinity);
      const min_y = system_coord_y.reduce((min, step) => Math.min(min, ...step), Infinity);

      const height = system_coord_z[0][0];
      const layout = {
        margin: { l: 0, r: 0, b: 0, t: 0 },
        scene: {
          xaxis: { title: 'X', range: [min_x, max_x], autorange: false },
          yaxis: { title: 'Y', range: [min_y, max_y], autorange: false },
          zaxis: { title: 'Z', range: [-1, height], autorange: false }
        },
        camera: {
          eye: { x: 0.8, y: 0.8, z: 0.8 }, // fixed view point
          center: { x: 0, y: 0, z: height/2 },
          up: { x: 0, y: 0, z: 1 }
        },
        aspectmode: 'manual',
        updatemenus: [{
          type: 'buttons',
          showactive: false,
          buttons: [{
            label: 'Play',
            method: 'animate',
            args: [null, {
              frame: { duration: 100, redraw: true },
              transition: { duration: 0 },
              fromcurrent: true,
              mode: "immediate"
            }]
          }]
        }],
      };

      const config = {
        willReadFrequently: true
      };
      Plotly.newPlot(plot, [trace], layout, config).then(() => {
        Plotly.addFrames(plot, frames)
      })
    }
  </script>
</body>

</html>
