<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

</head>

<body>
    <h2>Login</h2>
    <form id="login">
        Username: <input type="text" name="username"><br>
        Password: <input type="password" name="password"><br>
        <button type="submit">Login</button>
        <div id="login_message" style="color: red; margin-top: 10px;"></div>
        <button type="button" onclick="register()">Register</button>
    </form>

    <script>
        function register() {
            window.location.href = `register.html?`;
        }

        const form = document.getElementById('login');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('login_message');
            messageDiv.textContent = '';
            
            const username = form.username.value.trim();
            const password = form.password.value;
            // const res = await handle_login(username, password)
            if (!username || !password) {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'Please enter both username and password.';
                return;
            }

            const user_data = { username, password };

            try {
                const response = await fetch('/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(user_data)
                });
                if (!response.ok) {
                    const error = await response.json();
                    messageDiv.style.color = 'red';
                    messageDiv.textContent = error?.message || 'Invalid credentials';
                    return;
                }
                const data = await response.json();
                messageDiv.style.color = 'green';
                messageDiv.textContent = 'Successfully logging in..';

                setTimeout(() => {
                    window.location.href = `index.html?id=${data.id}`;
                }, 2000);
                // localStorage.setItem('authToken', data.authToken);
            } catch (error) {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'Network error: ' + error.message;
            }
        });


    </script>
</body>

</html>
