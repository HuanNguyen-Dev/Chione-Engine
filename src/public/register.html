<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Registration</title>

</head>

<body>
    <h2>Login</h2>
    <form id="register">
        Username: <input type="text" name="username" value="Doe@example.com"><br>
        Password: <input type="password" name="password" value="Passsword"><br>
        Confirm Password: <input type="text" name="confirm_password" value="Password"><br>
        <button type="submit">Register</button>
    </form>

    <script>
        async function handle_registration(username, password) {
            if (username && password) {
                const user_data = { username, password }
                try {
                    const response = await fetch('/user/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(user_data)
                    });
                    if (!response.ok) {
                        const error = await response.json();
                        return { ok: false, error: error.message || 'Registration failed' }
                    }
                    const data = await response.json();
                    // localStorage.setItem('authToken', data.authToken);
                    return { ok: true, data };
                } catch (error) {
                    return { ok: false, error: error.message }
                }
            }
            else return { ok: false, error: "Username or password is required" };
        }

        const form = document.getElementById('register');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = form.username.value;
            const password = form.password.value;
            const confirm_password = form.confirm_password.value;

            if (confirm_password !== password) {
                console.error("Passwords do not match")
            }
            const res = await handle_registration(username, password)

            if (res.ok) {
                console.log('Registration successful:', res.data);
                // Store authToken or take further action
            } else {
                console.error('Registration failed:', res.error);
            }
        });


    </script>
</body>

</html>
