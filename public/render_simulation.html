<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Cloud Simulation</title>
  <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
  <link rel="stylesheet" href="/styles/styles.css" />
  <style>
    #three {
      width: 100%;
      height: 600px;
      border: 1px solid #222;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <header>
    <button type="button" id="home" onclick="go_home()">Home Page</button>
  </header>
  <div class="center_container">
    <h2>Cloud Simulation</h2>
    <form id="simulation_form">
      <div class="row">
        Steps: <input type="number" name="steps" value="50">
        Height: <input type="number" name="height" value="10">
        Wind Speed: <input type="number" name="wind_speed" value="5">
        Wind Direction: <label for="wind_dir">Wind Direction:</label>
        <select name="wind_dir" id="wind_dir">
          <option value="north">North</option>
          <option value="south">South</option>
          <option value="east">East</option>
          <option value="west">West</option>
        </select>
        Min Neighbour: <input type="number" name="min_neighbour" value="3">
        Max Neighbour: <input type="number" name="max_neighbour" value="8">
      </div>

      <div>Initial State (Binary Only):</div>
      <table id="table"></table>
      <button type="button" onclick="add_row()">Add Row</button>
      <button type="button" onclick="add_col()">Add Column</button>
    </form>
  </div>
  <div class="row">
    <label><input type="radio" name="view" value="velocity"> View Velocity</label>
    <label><input type="radio" name="view" value="depth"> View Depth</label>
    <label><input type="radio" name="view" value="default" checked> Default View</label>
    <div id="randomInit">
      <div class="row">
        <label for="size">Randomly Initialise (max 50×50):</label>
        <input type="number" name="size" id="size" min="1" max="50" required>
      </div>
      <button type="button" onclick="randomInitialization()">Randomly Initialise State</button>
      <div id="randomInitDiv" style="color: red; margin-top: 10px;"></div>
    </div>
    <button type="submit">Run Simulation</button>
    <button type="button" id="playPauseBtn">Pause</button>
  </div>
  </form>
  <div id="three"></div>
  <script type="module" src="/js/render_simulation.js" defer></script>
</body>

</html>
