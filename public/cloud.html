<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cloud Simulation</title>
  <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
  <link rel="stylesheet" href="/styles/styles.css" />
</head>

<body>
  <header>
    <button type="button" id="register" onclick="go_home()">Home Page</button>
  </header>
  <div class="center_container">
    <h2>Cloud Simulation</h2>
    <form id="simulation_form" style="margin-bottom: 5px;">
      <div class="row">
        <label for="steps">Steps:</label>
        <input type="number" name="steps" id="steps" value="50" required>
      </div>

      <div class="row">
        <label for="height">Height:</label>
        <input type="number" name="height" id="height" value="10" required>
      </div>

      <div class="row">
        <label for="wind_speed">Wind Speed (50m/s Max):</label>
        <input type="number" name="wind_speed" id="wind_speed" value="5" min="0" max="50">
      </div>

      <div class="row">
        <label for="wind_dir">Wind Direction:</label>
        <select name="wind_dir" id="wind_dir">
          <option value="north">North</option>
          <option value="south">South</option>
          <option value="east">East</option>
          <option value="west">West</option>
        </select>
      </div>
      <div class="row">
        <label for="min_neighbour">Minimum Neighbour/s (To Survive):</label>
        <input type="number" name="min_neighbour" id="min_neighbour" value="3" min="0" max="8" required>
      </div>

      <div class="row">
        <label for="max_neighbour">Maximum Neighbour/s (To Survive):</label>
        <input type="number" name="max_neighbour" id="max_neighbour" value="8" min="0" max="8" required>
      </div>
      <div class="row">
        Initial State (Binary Only):
        <table id="table"></table>
        <button type="button" onclick="add_row()">Add Row</button>
        <button type="button" onclick="add_col()">Add Column</button>
      </div>

      <div>
        <input type="radio" id="velocity" name="view" value="velocity">
        <label for="velocity">View Velocity</label><br>

        <input type="radio" id="depth" name="view" value="depth">
        <label for="depth">View Depth</label><br>

        <input type="radio" id="none" name="view" value="default">
        <label for="none">Default View</label><br>
      </div>
      <button type="submit">Run Simulation</button>
      <div id="randomInit">
        <div class="row">
          <label for="size">Randomly Initialise (max 50×50):</label>
          <input type="number" name="size" id="size" min="1" max="50">
        </div>
        <button type="button" onclick="randomInitialization()">Randomly Initialise State</button>
      </div>
      <div id="randomInitDiv" style="color: red; margin-top: 10px;"></div>
      <button type="button" onclick="save_simulation()">Download Simulation</button>
      <button type="button" onclick="save_form_data()">Download Form Data</button>
      <button type="button" onclick="downloadSystemCoords()">Download System Coordinates</button>
    </form>
  </div>

  <video id="video" controls autoplay style="width:100%; height:600px;"></video>

  <script>
    const form = document.getElementById('simulation_form');
    const randomInitializationForm = document.getElementById('randomInit')
    const table = document.getElementById('table');
    const plot = document.getElementById('falling_snow_simulation');
    const pathSegments = window.location.pathname.split('/');
    const randomSizeInput = document.querySelector('#randomInit input[name="size"]');
    const id = new URLSearchParams(window.location.search).get('id');
    function go_home() {
      window.location.href = id ? `/?id=${id}` : `/`;
    }
    const messageDiv = document.getElementById('randomInitDiv');

    function calculate_number_particles(state) {
      return state.flat().reduce((accumulator, cur_value) => accumulator += cur_value, 0)
    }
    function retreive_initial_state() {
      messageDiv.textContent = '';
      const dim = Number(randomSizeInput.value);
      let initial_state;
      // check if user started simulation via random state or table
      if (dim > 0) {
        initial_state = Array.from({ length: dim }, () =>
          Array.from({ length: dim }, () => Math.random() > 0.5 ? 1 : 0)
        );
      }
      else {
        initial_state = Array.from(table.rows).map(row =>
          Array.from(row.cells).map(cell =>
            parseInt(cell.querySelector('input').value, 10)
          )
        );
      }
      if (calculate_number_particles(initial_state) <= 0) return null;
      return initial_state;
    }

    async function getSystemCoords(formData) {
      const res = await fetch('/simulation/falling_snow_calculation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });
      return res;
    }
    // downloads the coordinates for every particle in the system
    async function downloadSystemCoords() {
      try {
        // generate form to pass into endpoint to retreive coordinates
        const initial_state = retreive_initial_state();
        const formData = readInitializationVariables(initial_state);
        const res = await getSystemCoords(formData);
        // validation of payload
        if (!res.ok) {
          let error = { error: 'Invalid parameters!' };
          try {
            error = await res.json();
          } catch (parseErr) {
            error.error = res.statusText || 'Unknown error';
          }
          messageDiv.style.color = 'red';
          messageDiv.textContent = 'Error: ' + (`${error.error}` || 'Invalid parameters!');
          return;
        }
        // download the json file
        const data = await res.json();
        const jsonString = JSON.stringify(data, null, 2); // pretty print
        const blob = new Blob([jsonString], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'coordinate-history.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        messageDiv.textContent = `An error occured: ${err.message ? err.message : 'Internal server error!'}`;
      }
    }


    function save_form_data() {
      const initial_state = retreive_initial_state();
      const formData = readInitializationVariables(initial_state);
      messageDiv.textContent = '';
      if (!initial_state) {
        messageDiv.textContent = 'Please enter in an initial state!'
        return;
      }
      const obj = {};
      for (const [key, value] of Object.entries(formData)) {
        obj[key] = value;
      }
      const json = JSON.stringify(obj, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      console.log(url);
      a.download = 'form-data.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function save_simulation() {
      const initial_state = retreive_initial_state();
      const formData = readInitializationVariables(initial_state);
      const video = await downloadSimulationVideo(formData);
    }

    function add_row(cols = table.rows[0]?.cells.length || 3) {
      if (table.rows[0]?.cells.length > 50) return;
      const row = table.insertRow();
      for (let i = 0; i < cols; i++) {
        const new_cell = row.insertCell();
        const input = document.createElement('input');
        input.type = 'number';
        input.value = 0;
        input.min = 0;
        input.max = 1;
        input.step = 1;
        new_cell.appendChild(input);
      }
    }

    function add_col() {
      if (tables.rows.length > 50) return;
      for (let i = 0; i < table.rows.length; i++) {
        const new_cell = table.rows[i].insertCell();
        const input = document.createElement('input');
        input.type = 'number';
        input.value = 0;
        input.min = 0;
        input.max = 1;
        input.step = 1;
        new_cell.appendChild(input);
      }
    }

    function initialise_table(row, col) {
      for (let i = 0; i < row; i++) add_row(col);
    }

    function readInitializationVariables(initial_state) {
      // turn KVP into objects
      const formData = Object.fromEntries(new FormData(form));
      formData.initial_state = initial_state;
      formData.steps = Number(formData.steps);
      formData.height = Number(formData.height);
      formData.wind_speed = Number(formData.wind_speed);
      formData.wind_dir = formData.wind_dir;
      formData.min_neighbour = Number(formData.min_neighbour);
      formData.max_neighbour = Number(formData.max_neighbour);
      return formData;
    }

    async function fetchSimulationVideo(formData) {
      const res = await fetch('/simulation/falling_snow_video', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });
      return res;
    }

    async function downloadSimulationVideo(formData) {
      messageDiv.textContent = '';
      try {
        const res = await fetch('/simulation/save_falling_snow_video', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        if (!res.ok) {
          messageDiv.style.color = 'red';
          messageDiv.textContent = 'Please start the simulation first!';
        }
      } catch (errror) {
        messageDiv.style.color = 'red';
        messageDiv.textContent = 'An error occured please try again another time';
      }
    }

    async function getUser() {
      try {
        const userData = await fetch(`/user/me`, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' },
          credentials: "include",
        })
        if (userData.ok) {
          return true;
        }
        return false;
      } catch {
        return false;
      }
    }
    initialise_table(4, 4);

    async function randomInitialization() {
      messageDiv.textContent = '';
      const isUser = await getUser();
      if (!isUser) {
        messageDiv.style.color = 'red';
        messageDiv.textContent = 'You must log in to access this feature!';
        return;
      }
      const randomState = retreive_initial_state();
      const formData = readInitializationVariables(randomState);

      const video = await fetchSimulationVideo(formData);
      const blob = await video.blob();
      const url = URL.createObjectURL(blob);
      document.getElementById("video").src = url;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // retreive inital state from table into an array
      const initial_state = Array.from(table.rows).map(row =>
        Array.from(row.cells).map(cell =>
          parseInt(cell.querySelector('input').value, 10)
        )
      );
      //  initial_state, steps, height, wind_speed, wind_dir, min_neighbour, max_neighbour 
      // create fetch response based on user input
      const formData = readInitializationVariables(initial_state);
      const res = await fetchSimulationVideo(formData);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      document.getElementById("video").src = url;
    });
  </script>
</body>

</html>
