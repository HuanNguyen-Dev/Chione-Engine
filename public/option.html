<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Options</title>
    <link rel="stylesheet" href="/styles/styles.css" />


</head>

<body>
    <div class="center_container">
        <h2>User Settings</h2>
        <form id="change_password">
            Username: <input type="text" name="username"><br>
            Old Password: <input type="password" name="old_password"><br>
            New Password: <input type="password" name="new_password"><br>
            Confirm New Password: <input type="password" name="confirm_password"><br>
            <button type="submit">Change Password</button>
            <div id="update_password" style="color: red; margin-top: 10px;"></div>
        </form>
        <button type="button" onclick="delete_user()">Delete Account</button>
        <button type="button" onclick="go_home()">Go Back Home</button>
        <div id="delete_user" style="color: red; margin-top: 10px;"></div>
    </div>
    <script>

        const messageDiv = document.getElementById('update_password');
        messageDiv.textContent = '';
        const pathSegments = window.location.pathname.split('/');
        // pathSegments = ['', 'user', '1', 'update']

        const id = pathSegments[2];
        function go_home() {
            window.location.href = `/?id=${id}`;
        }

        async function delete_user() {
            try {
                const response = await fetch(`/user/${id}/delete`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: "include",
                    body: JSON.stringify({ reason: 'No longer needed' })
                })
                if (!response.ok) {
                    let error = { error: 'Failed to delete user.' };
                    try {
                        error = await response.json();
                    } catch (parseErr) {
                        error.error = response.statusText || 'Unknown error';
                    }
                    messageDiv.style.color = 'red';
                    messageDiv.textContent = 'Error: ' + (`${error.error}` || 'Failed to delete user.');
                    return;
                }

                messageDiv.style.color = 'green';
                messageDiv.textContent = 'Account deleted. Redirecting to login...';

                setTimeout(() => {
                    window.location.href = '/user/login';
                }, 200);
            } catch (error) {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'Network error: ' + (error || '');
                return;
            }
        }

        const form = document.getElementById('change_password');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            const username = form.username.value.trim();
            const new_password = form.new_password.value;
            const old_password = form.old_password.value;
            const confirm_password = form.confirm_password.value;
            if (!username || !new_password || !confirm_password || !old_password) {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'Please fill in all fields!';
                return;
            }

            if (new_password !== confirm_password) {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'New passwords do not match.';
                return;
            }

            if (old_password === new_password) {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'New password must not be the old password!';
                return;
            }
            const user_data = { username, old_password, new_password }

            try {
                const response = await fetch(`/user/${id}/update`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: "include",
                    body: JSON.stringify(user_data)
                });
                if (!response.ok) {
                    let error = { error: 'Failed to update password.' };
                    try {
                        error = await response.json();
                    } catch (parseErr) {
                        // response was not JSON, so fallback to status text
                        error.error = response.statusText || 'Unknown error';
                    }
                    messageDiv.style.color = 'red';
                    messageDiv.textContent = 'Error: ' + (`${error.error}` || 'Failed to update password.');
                    return;
                }
                messageDiv.style.color = 'green';
                messageDiv.textContent = 'Password changed. Redirecting to login...';

                setTimeout(() => {
                    window.location.href = '/user/login';
                }, 200);

            } catch (error) {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'Network error: ' + error.message;
                return
            }

        });


    </script>
</body>

</html>
