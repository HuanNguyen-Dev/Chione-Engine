Description: Launch EC2 instance that pulls and runs a container from ECR using docker compose

Resources:

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      KeyName: CAB432-N11596708-Huan-Nguyen
      SubnetId: subnet-075811427d5564cf9
      SecurityGroupIds:
        - sg-032bd1ff8cf77dbb9
      IamInstanceProfile: CAB432-Instance-Role
      ImageId: ami-09e4c2e0d9418a07f
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          exec > /var/log/user-data.log 2>&1
          set -x

          apt update

          sudo usermod -aG docker ubuntu
          sudo systemctl restart docker


          until docker info >/dev/null 2>&1; do
            echo "Waiting for Docker..."
            sleep 5
          done

          while [ ! -f /home/ubuntu/Cab432/docker-compose.yml ]; do
            echo "Waiting for docker-compose.yml..."
            sleep 5
          done

          cd /home/ubuntu/Cab432
          sudo -u ubuntu docker compose up --build