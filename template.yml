Description: Launch EC2 instance that pulls and runs a container from ECR using docker compose

Resources:

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      KeyName: CAB432-N11596708-Huan-Nguyen
      SubnetId: subnet-075811427d5564cf9
      SecurityGroupIds:
        - sg-032bd1ff8cf77dbb9
      IamInstanceProfile: CAB432-Instance-Role
      ImageId: ami-0d2ea0a8d6e2f655b
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          exec > /var/log/user-data.log 2>&1
          set -x

          apt update

          sudo usermod -aG docker ubuntu
          sudo systemctl restart docker


          until docker info >/dev/null 2>&1; do
            echo "Waiting for Docker..."
            sleep 5
          done
          aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 901444280953.dkr.ecr.ap-southeast-2.amazonaws.com
          sudo docker pull 901444280953.dkr.ecr.ap-southeast-2.amazonaws.com/n11596708-assignment-1:latest
          cd /home/ubuntu
          sudo -u ubuntu docker compose up -d