version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: pass
      DB_NAME: usersdb
    depends_on:
      - db

  db:
    image: mariadb:latest
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass       # root password for mariadb
      MYSQL_USER: user                    # your DB user
      MYSQL_PASSWORD: pass                # password for your DB user
      MYSQL_DATABASE: usersdb             # database name
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
